<script>
// ── Jobs state ────────────────────────────────────────────────
let _jobsData = [];
let _jobsSort = { col: null, dir: 1 };

// ── Scores state ──────────────────────────────────────────────
let _scoresData = [];
let _scoresSort = { col: null, dir: 1 };
let _visibleScoreIds = [];

// ── Applications state ────────────────────────────────────────
let _applicationsData = [];

// ── LinkedIn harvester state ───────────────────────────────────
let _harvestPollTimer = null;

// ── Match scorer state ─────────────────────────────────────────
let _scorerPollTimer = null;

async function startHarvest() {
  const btn = document.getElementById('harvest-btn');
  const statusEl = document.getElementById('harvest-status');
  if (!btn || btn.disabled) return;

  btn.disabled = true;
  btn.textContent = 'Running…';
  if (statusEl) statusEl.textContent = 'Running… (this may take several minutes)';

  try {
    const res = await fetch('/api/harvest/linkedin', { method: 'POST' });
    if (res.status === 409) {
      // Already running — start polling anyway
    } else if (!res.ok) {
      if (statusEl) statusEl.textContent = 'Failed to start harvester.';
      btn.disabled = false;
      btn.textContent = 'LinkedIn Jobs Pages';
      return;
    }
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Failed to start harvester.';
    btn.disabled = false;
    btn.textContent = 'LinkedIn Jobs Pages';
    return;
  }

  startHarvestPolling();
}

function startHarvestPolling() {
  if (_harvestPollTimer) return;
  _harvestPollTimer = setInterval(pollHarvestStatus, 5000);
}

async function pollHarvestStatus() {
  try {
    const res = await fetch('/api/harvest/linkedin/status');
    if (!res.ok) return;
    const data = await res.json();

    const btn = document.getElementById('harvest-btn');
    const statusEl = document.getElementById('harvest-status');

    if (data.status === 'idle') {
      clearInterval(_harvestPollTimer);
      _harvestPollTimer = null;

      if (btn) {
        btn.disabled = false;
        btn.textContent = 'LinkedIn Jobs Pages';
      }
      if (statusEl) {
        if (data.last_run_result === 'ok') {
          const ts = data.last_run_at ? new Date(data.last_run_at).toLocaleTimeString() : '';
          statusEl.textContent = `Last run: OK${ts ? ' at ' + ts : ''}`;
          statusEl.style.color = 'var(--score-high, #4ade80)';
        } else if (data.last_run_result === 'error') {
          statusEl.textContent = 'Last run: error';
          statusEl.style.color = 'var(--score-low, #f87171)';
        } else {
          statusEl.textContent = '';
        }
      }

      // Reload jobs data now that harvest is done
      if (location.hash === '#jobs' || location.hash === '') {
        navigate('jobs');
      }
    } else {
      // Still running
      if (btn) { btn.disabled = true; btn.textContent = 'Running…'; }
      if (statusEl) { statusEl.textContent = 'Running… (this may take several minutes)'; statusEl.style.color = ''; }
    }
  } catch (e) {
    // Silently ignore poll errors — server may be temporarily busy
  }
}

async function checkHarvestStatusOnLoad() {
  try {
    const res = await fetch('/api/harvest/linkedin/status');
    if (!res.ok) return;
    const data = await res.json();
    const btn = document.getElementById('harvest-btn');
    const statusEl = document.getElementById('harvest-status');
    if (!btn) return;

    if (data.status === 'running') {
      btn.disabled = true;
      btn.textContent = 'Running…';
      if (statusEl) { statusEl.textContent = 'Running… (this may take several minutes)'; }
      startHarvestPolling();
    } else {
      if (data.last_run_result === 'ok') {
        const ts = data.last_run_at ? new Date(data.last_run_at).toLocaleTimeString() : '';
        if (statusEl) { statusEl.textContent = `Last run: OK${ts ? ' at ' + ts : ''}`; statusEl.style.color = 'var(--score-high, #4ade80)'; }
      } else if (data.last_run_result === 'error') {
        if (statusEl) { statusEl.textContent = 'Last run: error'; statusEl.style.color = 'var(--score-low, #f87171)'; }
      }
    }
  } catch (e) { /* ignore */ }
}

async function startScorer() {
  const btn = document.getElementById('scorer-btn');
  const statusEl = document.getElementById('scorer-status');
  if (!btn || btn.disabled) return;

  btn.disabled = true;
  btn.textContent = 'Running…';
  if (statusEl) statusEl.textContent = 'Running… (this may take several minutes)';

  try {
    const res = await fetch('/api/score/run', { method: 'POST' });
    if (res.status === 409) {
      // Already running — start polling anyway
    } else if (!res.ok) {
      if (statusEl) statusEl.textContent = 'Failed to start scorer.';
      btn.disabled = false;
      btn.textContent = 'Run Match Scorer';
      return;
    }
  } catch (e) {
    if (statusEl) statusEl.textContent = 'Failed to start scorer.';
    btn.disabled = false;
    btn.textContent = 'Run Match Scorer';
    return;
  }

  startScorerPolling();
}

function startScorerPolling() {
  if (_scorerPollTimer) return;
  _scorerPollTimer = setInterval(pollScorerStatus, 5000);
}

async function fetchScorerProgress() {
  try {
    const res = await fetch('/api/score/progress');
    if (!res.ok) return null;
    return await res.json();
  } catch (e) { return null; }
}

async function pollScorerStatus() {
  try {
    const res = await fetch('/api/score/status');
    if (!res.ok) return;
    const data = await res.json();

    const btn = document.getElementById('scorer-btn');
    const statusEl = document.getElementById('scorer-status');

    if (data.status === 'idle') {
      clearInterval(_scorerPollTimer);
      _scorerPollTimer = null;

      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Run Match Scorer';
      }
      if (statusEl) {
        if (data.last_run_result === 'ok') {
          const ts = data.last_run_at ? new Date(data.last_run_at).toLocaleTimeString() : '';
          statusEl.textContent = `Last run: OK${ts ? ' at ' + ts : ''}`;
          statusEl.style.color = 'var(--score-high, #4ade80)';
        } else if (data.last_run_result === 'error') {
          statusEl.textContent = 'Last run: error';
          statusEl.style.color = 'var(--score-low, #f87171)';
        } else {
          statusEl.textContent = '';
        }
      }

      // Reload scores data now that scorer is done
      if (location.hash === '#scores') {
        navigate('scores');
      }
    } else {
      // Still running — fetch progress
      if (btn) { btn.disabled = true; btn.textContent = 'Running…'; }
      if (statusEl) {
        const prog = await fetchScorerProgress();
        const progText = prog ? ` (${prog.scored} / ${prog.total})` : '';
        statusEl.textContent = `Running…${progText}`;
        statusEl.style.color = '';
      }
    }
  } catch (e) {
    // Silently ignore poll errors — server may be temporarily busy
  }
}

async function checkScorerStatusOnLoad() {
  try {
    const res = await fetch('/api/score/status');
    if (!res.ok) return;
    const data = await res.json();
    const btn = document.getElementById('scorer-btn');
    const statusEl = document.getElementById('scorer-status');
    if (!btn) return;

    if (data.status === 'running') {
      btn.disabled = true;
      btn.textContent = 'Running…';
      if (statusEl) {
        const prog = await fetchScorerProgress();
        const progText = prog ? ` (${prog.scored} / ${prog.total})` : '';
        statusEl.textContent = `Running…${progText}`;
      }
      startScorerPolling();
    } else {
      if (data.last_run_result === 'ok') {
        const ts = data.last_run_at ? new Date(data.last_run_at).toLocaleTimeString() : '';
        if (statusEl) { statusEl.textContent = `Last run: OK${ts ? ' at ' + ts : ''}`; statusEl.style.color = 'var(--score-high, #4ade80)'; }
      } else if (data.last_run_result === 'error') {
        if (statusEl) { statusEl.textContent = 'Last run: error'; statusEl.style.color = 'var(--score-low, #f87171)'; }
      }
    }
  } catch (e) { /* ignore */ }
}

const APP_STATUS_BADGE = {
  applied:      'badge-blue',
  waiting:      'badge-muted',
  phone_screen: 'badge-amber',
  interview:    'badge-amber',
  offer:        'badge-green',
  dead:         'badge-muted',
  withdrawn:    'badge-muted',
  saved:        'badge-muted',
};

function appStatusBadge(status) {
  const cls = APP_STATUS_BADGE[status] || 'badge-muted';
  return `<span class="badge ${cls}">${status || '?'}</span>`;
}

function filterApplications(filter) {
  document.querySelectorAll('[data-appfilter]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.appfilter === filter);
  });
  renderApplicationsTable(filter);
}

function renderApplicationsTable(statusFilter) {
  if (statusFilter === undefined) {
    statusFilter = document.querySelector('[data-appfilter].active')?.dataset.appfilter || 'all';
  }
  const companyFilter = (document.getElementById('app-filter-company')?.value || '').toLowerCase().trim();

  const data = _applicationsData.filter(r => {
    if (statusFilter !== 'all' && r.status !== statusFilter) return false;
    if (companyFilter && !(r.company || '').toLowerCase().includes(companyFilter)) return false;
    return true;
  });

  const cols = [
    { label: 'Status', render: r => {
      const statuses = ['new','applied','waiting','phone_screen','interview','offer','rejected','withdrawn','dead'];
      const opts = statuses.map(s =>
        `<option value="${s}" ${r.status === s ? 'selected' : ''}>${s}</option>`
      ).join('');
      return `<select class="status-select" data-id="${r.id}" onchange="updateAppStatus(this)">
        ${opts}
      </select>`;
    }},
    { label: 'Company',    cls: 'cell-primary',   render: r => {
      const name = r.company || '—';
      const star = r.is_interesting_company ? ' <span title="Interesting Company" style="color:var(--accent);font-size:11px;">&#9733;</span>' : '';
      return name + star;
    }},
    { label: 'Job Title',  cls: 'cell-primary', render: r => {
      const title = r.job_title || '—';
      const url = r.job_url || r.application_link;
      if (url) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="ext-link-title">${title}</a>`;
      }
      return title;
    }},
    { label: 'Score', render: r => scorePill(r.overall_score) },
    { label: 'Apply Date', cls: 'cell-muted',      render: r => date(r.apply_date) },
    { label: 'Contact',    cls: 'cell-secondary', render: r => r.contact || '—' },
    { label: 'Notes', render: r => {
      const val = (r.notes || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      return `<textarea class="notes-input" data-id="${r.id}" rows="2"
        onblur="updateAppNotes(this)">${r.notes || ''}</textarea>`;
    }},
    { label: 'Cover Letter', render: r => {
      const hasCL = r.cover_letter && r.cover_letter.trim().length > 0;
      return `<button class="cl-btn ${hasCL ? 'cl-btn-has' : 'cl-btn-empty'}"
        onclick="showCoverLetter(${r.id})">${hasCL ? '✎ Edit' : '+ Add'}</button>`;
    }},
  ];

  document.getElementById('applications-table').innerHTML = table(cols, data,
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    'No applications match this filter');
}

function scoreClass(n) {
  if (n == null) return 'score-na';
  if (n >= 75) return 'score-high';
  if (n >= 60) return 'score-mid';
  if (n >= 45) return 'score-low';
  return 'score-skip';
}

function scorePill(n) {
  if (n == null) return '<span class="score-pill score-na">—</span>';
  return `<span class="score-pill ${scoreClass(n)}">${n}</span>`;
}

const REC_BADGE = {
  'STRONG FIT':  'badge-green',
  'GOOD FIT':    'badge-blue',
  'MARGINAL FIT':'badge-amber',
  'SKIP':        'badge-muted',
};

function recBadge(rec) {
  return `<span class="badge ${REC_BADGE[rec] || 'badge-muted'}">${rec || '?'}</span>`;
}

function arrBadge(arr) {
  const m = { 'Remote':'badge-green', 'Hybrid':'badge-amber', 'On-site':'badge-blue', 'Not stated':'badge-muted' };
  return `<span class="badge ${m[arr] || 'badge-muted'}">${arr || 'Not stated'}</span>`;
}

function getScoreFilters() {
  const fitBoxes  = document.querySelectorAll('[data-fit-filter]');
  const arrBoxes  = document.querySelectorAll('[data-arr-filter]');
  const fitSet = fitBoxes.length
    ? new Set([...fitBoxes].filter(el => el.checked).map(el => el.dataset.fitFilter))
    : new Set(['STRONG FIT','GOOD FIT','MARGINAL FIT','SKIP','']);
  const arrSet = arrBoxes.length
    ? new Set([...arrBoxes].filter(el => el.checked).map(el => el.dataset.arrFilter))
    : new Set(['Remote','Hybrid','On-site','Not stated','']);
  const recencyEl = document.querySelector('[data-recency-filter]:checked');
  const recency = recencyEl ? recencyEl.dataset.recencyFilter : 'all';
  return { fitSet, arrSet, recency };
}

function renderScoresTable() {
  const { fitSet, arrSet, recency } = getScoreFilters();

  // Compute recency cutoffs once
  let todayStr = null;
  let lastRunCutoff = null;
  if (recency === 'today') {
    todayStr = new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
  } else if (recency === 'lastrun') {
    const timestamps = _scoresData
      .map(j => j.scored_at)
      .filter(Boolean)
      .map(s => new Date(s).getTime())
      .filter(t => !isNaN(t));
    if (timestamps.length) {
      const maxTs = Math.max(...timestamps);
      lastRunCutoff = maxTs - 2 * 60 * 60 * 1000; // 2 hours before max
    }
  }

  const filtered = _scoresData.filter(j => {
    const fit = j.recommendation || '';
    const arr = j.work_arrangement || 'Not stated';
    if (!fitSet.has(fit) || !arrSet.has(arr)) return false;
    if (recency === 'today') {
      if (!j.scored_at) return false;
      return j.scored_at.slice(0, 10) === todayStr;
    }
    if (recency === 'lastrun') {
      if (!j.scored_at || lastRunCutoff === null) return false;
      return new Date(j.scored_at).getTime() >= lastRunCutoff;
    }
    return true;
  });
  const data = applySortToData(filtered, _scoresSort);
  _visibleScoreIds = data.map(j => j.id);

  // Update archive button and shown count
  const archiveBtn = document.getElementById('archive-btn');
  if (archiveBtn) archiveBtn.textContent = `Archive Shown (${data.length})`;
  const statTotal = document.getElementById('score-stat-total');
  if (statTotal) statTotal.textContent = data.length;

  const cols = [
    { label: 'ID',          sortKey: 'id',           render: r => `<span class="cell-muted">${r.id}</span>` },
    { label: 'Title',       sortKey: 'job_title',    cls: 'cell-primary', render: r =>
        `<a class="clickable" onclick="showAssessment(${r.id})">${r.job_title || '?'}</a>` +
        (r.job_url ? ` <a href="${r.job_url}" target="_blank" class="ext-link" title="Open listing">↗</a>` : '')
    },
    { label: 'Company',     sortKey: 'company',      cls: 'cell-secondary', render: r => r.company || '—' },
    { label: 'Source',      sortKey: 'job_board',    render: r => `<span class="badge badge-muted">${r.job_board || '—'}</span>` },
    { label: 'Score',       sortKey: 'overall_score', render: r => scorePill(r.overall_score) },
    { label: 'Fit',         sortKey: 'recommendation', render: r => recBadge(r.recommendation) },
    { label: 'Arrangement', sortKey: 'work_arrangement', render: r => arrBadge(r.work_arrangement) },
    { label: 'Scored',      sortKey: 'scored_at',    cls: 'cell-muted', render: r => date(r.scored_at) },
    { label: 'Apply', render: r =>
        `<button class="apply-toggle ${r.apply_flag ? 'apply-on' : ''}" onclick="toggleApply(event,${r.id},${r.apply_flag})">${r.apply_flag ? '★' : '☆'}</button>`
    },
  ];

  document.getElementById('scores-table').innerHTML = table(cols, data,
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    'No jobs match this filter', _scoresSort, 'sortScores');
}

function sortScores(col) {
  if (_scoresSort.col === col) _scoresSort.dir *= -1;
  else { _scoresSort.col = col; _scoresSort.dir = 1; }
  renderScoresTable();
}

async function archiveShown() {
  const ids = [..._visibleScoreIds];
  if (!ids.length) return;
  const ok = window.confirm(
    `Really, really archive ${ids.length} job${ids.length === 1 ? '' : 's'}?\n\nThis hides them from all views. There is no undo in the UI.`
  );
  if (!ok) return;
  const btn = document.getElementById('archive-btn');
  if (btn) btn.disabled = true;
  try {
    await fetch('/api/jobs/archive', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ ids })
    });
    navigate('scores');
  } catch(e) {
    if (btn) btn.disabled = false;
  }
}

async function toggleApply(e, jobId, currentVal) {
  e.stopPropagation();
  const newVal = currentVal ? 0 : 1;
  await fetch(`/api/jobs/${jobId}/apply/${newVal}`, { method: 'POST' });
  const job = _scoresData.find(j => j.id === jobId);
  if (job) {
    job.apply_flag = newVal;
    renderScoresTable();
  }
}

function showAssessment(jobId) {
  const j = _scoresData.find(r => r.id === jobId);
  if (!j) return;

  const strengths = (j.strengths || '').split('|').map(s => s.trim()).filter(Boolean);
  const gaps      = (j.gaps      || '').split('|').map(s => s.trim()).filter(Boolean);

  const scoreGrid = ['overall_score','skills_score','seniority_score','work_type_score']
    .map((k, i) => {
      const labels = ['Overall','Skills','Seniority','Work Type'];
      const v = j[k];
      return `<div class="ascore-card">

// ── Model badge ───────────────────────────────────────────────
function modelBadge(model) {
  if (!model) return '—';
  if (model.includes('opus'))   return `<span class="badge badge-green">Opus</span>`;
  if (model.includes('sonnet')) return `<span class="badge badge-blue">Sonnet</span>`;
  if (model.includes('haiku'))  return `<span class="badge badge-muted">Haiku</span>`;
  return `<span class="badge badge-muted">${model}</span>`;
}

// ── Badges ────────────────────────────────────────────────────
const STATUS_BADGE = {
  active:      '<span class="badge badge-green">Active</span>',
  completed:   '<span class="badge badge-blue">Completed</span>',
  in_progress: '<span class="badge badge-blue">In Progress</span>',
  pending:     '<span class="badge badge-amber">Pending</span>',
  on_hold:     '<span class="badge badge-amber">On Hold</span>',
  inactive:    '<span class="badge badge-muted">Inactive</span>',
  cancelled:   '<span class="badge badge-muted">Cancelled</span>',
  researching: '<span class="badge badge-accent">Researching</span>',
  hiring:      '<span class="badge badge-accent">Hiring</span>',
};

const PRIORITY_BADGE = {
  high:   '<span class="badge badge-red">High</span>',
  normal: '<span class="badge badge-accent">Normal</span>',
  low:    '<span class="badge badge-muted">Low</span>',
};

function badge(map, val) {
  return map[val] || `<span class="badge badge-muted">${val}</span>`;
}

function date(str) {
  return str ? str.slice(0, 10) : '—';
}

function empty(icon, text) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <p class="empty-text">${text}</p>
  </div>`;
}

function table(cols, rows, emptyIcon, emptyText, sortState, sortFn) {
  if (!rows.length) return empty(emptyIcon, emptyText);
  const head = cols.map(c => {
    if (c.sortKey && sortState && sortFn) {
      const active = sortState.col === c.sortKey;
      const ind = active ? (sortState.dir === 1 ? ' ▲' : ' ▼') : '';
      return `<th class="sortable${active?' sort-active':''}" onclick="${sortFn}('${c.sortKey}')">${c.label}<span class="sort-ind">${ind}</span></th>`;
    }
    return `<th>${c.label}</th>`;
  }).join('');
  const body = rows.map(r =>
    '<tr>' + cols.map(c => `<td class="${c.cls||''}">${c.render(r)}</td>`).join('') + '</tr>'
  ).join('');
  return `<div class="table-card"><table>
    <thead><tr>${head}</tr></thead>
    <tbody>${body}</tbody>
  </table></div>`;
}

function applySortToData(data, sortState) {
  if (!sortState.col) return data;
  const col = sortState.col;
  const dir = sortState.dir;
  return [...data].sort((a, b) => {
    const av = a[col] ?? '';
    const bv = b[col] ?? '';
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
}

// ── Jobs sort + render ────────────────────────────────────────
function sortJobs(col) {
  if (_jobsSort.col === col) _jobsSort.dir *= -1;
  else { _jobsSort.col = col; _jobsSort.dir = 1; }
  renderJobsTable();
}

function renderJobsTable() {
  const data = applySortToData(_jobsData, _jobsSort);
  const cols = [
    { label: 'ID',         sortKey: 'id',               render: r => `<span class="cell-muted">${r.id}</span>` },
    { label: 'Title',      sortKey: 'job_title',        cls: 'cell-primary', render: r =>
        `<a class="clickable" onclick="showJobDescription(${r.id}, '${(r.job_title||'').replace(/'/g,"\\'")} @ ${(r.company||'').replace(/'/g,"\\'")}')">${r.job_title || '?'}</a>` +
        (r.job_url ? ` <a href="${r.job_url}" target="_blank" class="ext-link" title="Open listing">↗</a>` : '')
    },
    { label: 'Company',    sortKey: 'company',          cls: 'cell-secondary', render: r => r.company || '—' },
    { label: 'Source',     sortKey: 'job_board',        render: r => `<span class="badge badge-muted">${r.job_board || '—'}</span>` },
    { label: 'Location',   sortKey: 'location',         cls: 'cell-secondary', render: r => r.location || '—' },
    { label: 'Type',       sortKey: 'work_type',        render: r => {
      const m = { remote:'badge-green', hybrid:'badge-amber', onsite:'badge-blue', unknown:'badge-muted' };
      return `<span class="badge ${m[r.work_type]||'badge-muted'}">${r.work_type||'?'}</span>`;
    }},
    { label: 'Status',     sortKey: 'status',           render: r => {
      const opts = ['new','scored','skip','duplicate'].map(s =>
        `<option value="${s}"${r.status===s?' selected':''}>${s}</option>`
      ).join('');
      return `<select class="status-select" onchange="updateJobStatus(${r.id}, this.value)">${opts}</select>`;
    }},
    { label: 'Seen',       sortKey: 'first_date_seen',  cls: 'cell-muted', render: r => date(r.first_date_seen) },
  ];
  document.getElementById('jobs-table').innerHTML = table(cols, data,
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>',
    'No jobs harvested yet', _jobsSort, 'sortJobs');
}

async function updateJobStatus(id, val) {
  await fetch(`/api/jobs/${id}/status`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ status: val })
  });
  const row = _jobsData.find(r => r.id === id);
  if (row) row.status = val;
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(title, markdown) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = marked.parse(markdown);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function showMemberProfile(name) {
  const res = await fetch(`/api/member/${encodeURIComponent(name)}/profile`);
  if (!res.ok) return;
  openModal(name, await res.text());
}

async function showJobDescription(jobId, label) {
  const res = await fetch(`/api/jobs/${jobId}/description`);
  if (!res.ok) { openModal(label, '_No description available._'); return; }
  const text = await res.text();
  // Render as plain text in a <pre> block
  document.getElementById('modal-title').textContent = label;
  document.getElementById('modal-body').innerHTML = `<pre class="job-desc">${text.replace(/</g,'&lt;')}</pre>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function showHiringBrief(hiringId, roleName) {
  const res = await fetch(`/api/hiring/${hiringId}/brief`);
  if (!res.ok) { openModal(roleName, '_No candidate brief available for this hire._'); return; }
  openModal(`Candidate Brief — ${roleName}`, await res.text());
}

async function renderMemberPage(name) {
  const appEl = document.getElementById('app');
  appEl.innerHTML = '<div class="loading">Loading…</div>';

  const [profileRes, rosterRes] = await Promise.all([
    fetch(`/api/member/${encodeURIComponent(name)}/profile`),
    fetch('/api/roster')
  ]);

  const profileMd = profileRes.ok ? await profileRes.text() : '_Profile not found._';
  const roster = rosterRes.ok ? await rosterRes.json() : [];
  const member = roster.find(m => m.name.toLowerCase() === name.toLowerCase()) || {};

  appEl.innerHTML = `
    <div class="member-page">
      <button class="back-btn" onclick="navigate('roster')">← Roster</button>
      <div class="member-hero">
        <img class="member-avatar-full" src="/api/member/${name.toLowerCase()}/avatar/full" alt="${member.name || name}">
        <div class="member-hero-info">
          <h1 class="member-name">${member.name || name}</h1>
          <div class="member-role">${member.role || ''}</div>
          <div class="member-domain cell-muted">${member.domain || ''}</div>
          ${member.model ? `<div class="member-model" style="margin-top:8px;">${modelBadge(member.model)}</div>` : ''}
        </div>
      </div>
      <div class="member-profile markdown">${marked.parse(profileMd)}</div>
    </div>
  `;
}

  const id = el.dataset.id;

      <button onclick="saveCoverLetter(${appId})"
        style="padding:6px 18px;border-radius:6px;background:var(--accent);color:#fff;
        border:none;font-size:13px;font-family:inherit;cursor:pointer;">Save</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveCoverLetter(appId) {
  const text = document.getElementById('cl-editor').value;
  await fetch(`/api/applications/${appId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ cover_letter: text })
  });
  const row = _applicationsData.find(r => r.id === appId);
  if (row) row.cover_letter = text;
  closeModal();
  renderApplicationsTable();
}

async function updateAppNotes(el) {
  const id = el.dataset.id;
  const notes = el.value;
  await fetch(`/api/applications/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ notes })
  });
  const row = _applicationsData.find(r => r.id == id);
  if (row) row.notes = notes;
}

// ── Router ────────────────────────────────────────────────────
const app = document.getElementById('app');

async function navigate(viewName) {
  if (viewName.startsWith('member/')) {
    // Setting the hash fires hashchange → route() → renderMemberPage()
    location.hash = viewName;
    return;
  }

  const view = VIEWS[viewName];
  if (!view) return navigate('roster');

  // Update nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === viewName);
  });

  // Show loading
  app.innerHTML = `<div class="page-header">
    <h1 class="page-title">${view.title}</h1>
    <p class="page-subtitle">${view.subtitle}</p>
  </div><div class="loading">Loading…</div>`;

  try {
    const res  = await fetch(view.api);
    const data = await res.json();
    app.innerHTML = `<div class="page-header">
      <h1 class="page-title">${view.title}</h1>
      <p class="page-subtitle">${view.subtitle}</p>
    </div>${view.render(data)}`;
    if (view.afterRender) view.afterRender();
  } catch (e) {
    app.innerHTML = `<div class="page-header">
      <h1 class="page-title">${view.title}</h1>
    </div><div class="empty-state"><p class="empty-text">Failed to load data</p></div>`;
  }
}

// Hash-based routing
function route() {
  const hash = location.hash.replace('#', '') || 'roster';
  if (hash.startsWith('member/')) {
    const name = hash.slice('member/'.length);
    // Clear active nav state — member page is not a top-level nav item
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    renderMemberPage(name);
  } else {
    navigate(hash);
  }
}

window.addEventListener('hashchange', route);
route();
</script>
